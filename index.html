<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laspr Lifestyles creations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #fff;
            width: 240px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        h3 {
            margin: 10px 0 5px;
        }

        p {
            margin: 5px 0 15px;
        }

        .btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background: #444;
        }
    </style>
</head>

<body>

    <header>
        <h1>Laspr Lifestyles creations</h1>
    </header>

    <section class="hero">
        <h2>New Collection</h2>
        <p>Trendy outfits just for you</p>
    </section>

    <section class="products">

        <!-- Product 1 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f?w=300" alt="Black Dress">
            <h3>Black Dress</h3>
            <p>₹999</p>
            <a class="btn" href="https://wa.me/919876543210?text=Hi, I want to order Black Dress" target="_blank">
                Order Now
            </a>
        </div>

        <!-- Product 2 -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300" alt="White Top">
            <h3>White Top</h3>
            <p>₹699</p>
            <a class="btn" href="https://wa.me/919876543210?text=Hi, I want to order White Top" target="_blank">
                Order Now
            </a>
        </div>

    </section>

</body>

</html>
