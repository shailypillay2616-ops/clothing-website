<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASPR</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    padding-top: 80px;
}

/* WATERMARK */
body::before {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    background: url("logo.png") no-repeat center;
    background-size: contain;
    opacity: 0.03;
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    z-index: 1000;
}

nav ul {
    display: flex;
    gap: 20px;
    list-style: none;
}

/* BANNER */
.banner img {
    width: 100%;
}

/* SECTIONS */
.products {
    padding: 40px;
}

h2 {
    text-align: center;
}

/* GRID */
.product-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 25px;
}

/* CARD */
.card {
    position: relative;
    cursor: pointer;
}

.card img {
    width: 100%;
}

/* QUICK VIEW */
.quick-view {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 8px 15px;
    opacity: 0;
    transition: 0.3s;
}

.card:hover .quick-view {
    opacity: 1;
}

/* TEXT */
.card h3, .card p {
    margin: 5px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:20px;
    width:300px;
    text-align:center;
}

/* BUTTON */
.btn {
    display:block;
    margin:5px;
    padding:10px;
    text-decoration:none;
}

.whatsapp { background:black; color:white; }
.amazon { border:1px solid black; color:black; }

/* CART */
#cart-box {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: black;
    color: white;
    padding: 10px;
}

/* CONTACT */
#contact {
    text-align:center;
    padding:40px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>LASPR</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#shiv">Categories</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- BANNER -->
<div class="banner">
<img src="banner.jpg">
</div>

<!-- SPIRITUAL -->
<div class="products">
<h2 id="shiv">Spiritual Collection</h2>
<div class="product-grid">

<div class="card" onclick="openModal('Radha Krishna Tee','radha.jpg','450')">
<img src="radha.jpg">
<div class="quick-view">Quick View</div>
<h3>Radha Krishna Tee</h3>
<p>₹450</p>
</div>

<div class="card" onclick="openModal('Shiv Graphic Tee','shiv.jpg','450')">
<img src="shiv.jpg">
<div class="quick-view">Quick View</div>
<h3>Shiv Graphic Tee</h3>
<p>₹450</p>
</div>

</div>
</div>

<!-- BASIC -->
<div class="products">
<h2>Basic Tees</h2>
<div class="product-grid">

<div class="card" onclick="openModal('Basic Tee','basic.jpg','400')">
<img src="basic.jpg">
<div class="quick-view">Quick View</div>
<h3>Basic White Tee</h3>
<p>₹400</p>
</div>

</div>
</div>

<!-- HOODIES -->
<div class="products">
<h2>Hoodies</h2>
<div class="product-grid">

<div class="card" onclick="openModal('Charcoal Hoodie','hoodie.jpg','1000')">
<img src="hoodie.jpg">
<div class="quick-view">Quick View</div>
<h3>Charcoal Hoodie</h3>
<p>₹1000</p>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<img id="img" width="100%">
<h3 id="title"></h3>
<p id="price"></p>

<a id="wa" class="btn whatsapp" target="_blank">WhatsApp</a>
<a id="amz" class="btn amazon" target="_blank">Amazon</a>

<button onclick="addCart()">Add to Cart</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- CART -->
<div id="cart-box">Cart: <span id="count">0</span></div>

<!-- CONTACT -->
<div id="contact">
<h2>Contact Us</h2>
<p>WhatsApp: 9953690905</p>
</div>

<script>

let cart = 0;

function openModal(title,img,price){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("img").src=img;
document.getElementById("price").innerText="₹"+price;

document.getElementById("wa").href =
"https://wa.me/919953690905?text=I want to order "+title;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addCart(){
cart++;
document.getElementById("count").innerText=cart;
}

</script>

</body>
</html>
