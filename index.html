<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASPR</title>

<style>

body {
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#fff;
}

/* NAV */
nav {
position:fixed;
top:0;
width:100%;
background:black;
color:white;
display:flex;
justify-content:space-between;
padding:15px 30px;
z-index:1000;
}

/* BANNER */
.banner img {
width:100%;
margin-top:60px;
}

/* GRID */
.products {
padding:50px;
}

.product-grid {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

/* CARD */
.card {
cursor:pointer;
transition:0.3s;
}

.card img {
width:100%;
}

.card:hover {
transform:scale(1.02);
}

/* TEXT */
.card h3 {
font-size:14px;
margin:10px 0 5px;
}

.card p {
color:#555;
}

/* QUICK VIEW */
.quick {
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:8px;
opacity:0;
}

.card:hover .quick {
opacity:1;
}

/* MODAL */
.modal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-box {
background:white;
padding:20px;
width:300px;
text-align:center;
}

</style>
</head>

<body>

<nav>
<h2>LASPR</h2>
</nav>

<div class="banner">
<img src="banner.jpg">
</div>

<div class="products">
<h2>Spiritual Collection</h2>

<div class="product-grid">

<div class="card" onclick="openModal('Radha Krishna Tee','radha.jpg',450)">
<img src="radha.jpg">
<h3>Radha Krishna Tee</h3>
<p>₹450</p>
</div>

<div class="card" onclick="openModal('Shiv Tee','shiv.jpg',450)">
<img src="shiv.jpg">
<h3>Shiv Tee</h3>
<p>₹450</p>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<img id="img" width="100%">
<h3 id="title"></h3>
<p id="price"></p>

<a id="wa" target="_blank">Order on WhatsApp</a><br>
<a id="amz" target="_blank">Buy on Amazon</a><br><br>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

function openModal(title,img,price){
document.getElementById("modal").style.display="flex";
document.getElementById("img").src=img;
document.getElementById("title").innerText=title;
document.getElementById("price").innerText="₹"+price;

document.getElementById("wa").href =
"https://wa.me/919953690905?text=I want to order "+title;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
