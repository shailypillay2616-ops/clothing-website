<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASPR Lifestyles Creations</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* NAVBAR */
nav {
    background: #000;
    color: #fff;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
}

nav ul {
    display: flex;
    gap: 20px;
    list-style: none;
}

/* BANNER */
.banner {
    position: relative;
}

.banner img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    display: block;
}

.banner-text {
    position: absolute;
    top: 50%;
    left: 10%;
    transform: translateY(-50%);
    color: white;
}

.banner-text h1 {
    font-size: 42px;
    margin: 0;
}

.banner-text p {
    font-size: 18px;
    margin: 10px 0;
}

.shop-btn {
    background: gold;
    color: black;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

/* CATEGORIES */
.categories {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 20px 0;
}

.cat {
    background: #000;
    color: #fff;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
}

/* PRODUCTS */
.products {
    padding: 40px 20px;
}

.product-grid {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: #fff;
    width: 260px;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    display: block;
    margin: 5px 0;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
}

.whatsapp { background: green; color: white; }
.amazon { background: orange; color: white; }

html {
    scroll-behavior: smooth;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>LASPR</h2>
    <ul>
        <li><a href="#" style="color:white;">Home</a></li>
        <li><a href="#shiv" style="color:white;">Categories</a></li>
        <li><a href="#contact" style="color:white;">Contact</a></li>
    </ul>
</nav>

<!-- BANNER -->
<div class="banner">
    <img src="banner.jpg" alt="Banner">
    <div class="banner-text">
        <a href="#shiv" class="shop-btn">Shop Now</a>
    </div>
</div>

<!-- CATEGORIES -->
<div class="categories">
    <a href="#shiv" class="cat">Shiv Collection</a>
    <a href="#basic" class="cat">Basic Tees</a>
    <a href="#hoodies" class="cat">Hoodies</a>
</div>

<!-- SHIV -->
<div class="products">
<h2 id="shiv" style="text-align:center;">Shiv Collection</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1542060748-10c28b62716f?w=300">
<h3>Shiv T-Shirt</h3>
<p>₹799</p>

<a class="btn whatsapp" href="#">Order on WhatsApp</a>
<a class="btn amazon" href="#">Buy on Amazon</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=300">
<h3>Shiv Graphic Tee</h3>
<p>₹899</p>

<a class="btn whatsapp" href="#">Order on WhatsApp</a>
<a class="btn amazon" href="#">Buy on Amazon</a>
</div>

</div>
</div>

</body>
</html>
