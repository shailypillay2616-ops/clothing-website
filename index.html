<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASPR Clothing</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        nav {
            background: #000;
            color: #fff;
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
        }

        nav ul {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .hero {
            text-align: center;
            padding: 40px;
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .cat {
            background: #000;
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
        }

        .products {
            padding: 20px;
        }

        .product-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #fff;
            width: 240px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .btn {
            display: block;
            margin: 5px 0;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .whatsapp {
            background: green;
            color: white;
        }

        .amazon {
            background: orange;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <h2>LASPR</h2>
        <ul>
            <li>Home</li>
            <li>Categories</li>
            <li>Contact</li>
        </ul>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>Spiritual Streetwear</h1>
        <p>Wear Your Energy</p>
    </div>

    <!-- Categories -->
    <div class="categories">
        <div class="cat">Shiv Collection</div>
        <div class="cat">Basic Tees</div>
        <div class="cat">Hoodies</div>
        <div class="cat">Custom Prints</div>
    </div>

    <!-- Products -->
    <div class="products">

        <h2 style="text-align:center;">Shiv Collection</h2>

        <div class="product-grid">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f?w=300">
                <h3>Shiv T-Shirt</h3>
                <p>₹799</p>

                <a class="btn whatsapp" href="https://wa.me/9873407149?text=Order Shiv T-Shirt" target="_blank">
                    Order on WhatsApp
                </a>

                <a class="btn amazon" href="https://www.amazon.in/s?rh=n%3A1571271031%2Cp_4%3ALASPR%2BLifestyle%2BCreations&ref=bl_sl_s_ap_web_1571271031" target="_blank">
                    Buy on Amazon
                </a>
            </div>

        </div>

    </div>

</body>

</html>
