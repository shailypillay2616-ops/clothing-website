<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LASPR</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #fff;
    padding-top: 80px;
}

/* WATERMARK */
body::before {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    background: url("logo.png") no-repeat center;
    background-size: contain;
    opacity: 0.03;
    filter: blur(2px);
    transform: translate(-50%, -50%);
    z-index: -1;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    z-index: 1000;
}

/* BANNER */
.banner img {
    width: 100%;
}

/* GRID */
.product-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    position: relative;
    cursor: pointer;
}

.card img {
    width: 100%;
}

/* HOVER QUICK VIEW */
.quick-view {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 8px 15px;
    opacity: 0;
    transition: 0.3s;
}

.card:hover .quick-view {
    opacity: 1;
}

/* TEXT */
.card h3, .card p {
    margin: 5px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:20px;
    width:300px;
    text-align:center;
}

/* BUTTON */
.btn {
    display:block;
    margin:5px;
    padding:10px;
    text-decoration:none;
}

.whatsapp { background:black; color:white; }
.amazon { border:1px solid black; color:black; }

/* CART */
#cart {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: black;
    color: white;
    padding: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<nav>
<h2>LASPR</h2>
<div>Cart 🛒 (<span id="cart-count">0</span>)</div>
</nav>

<div class="banner">
<img src="banner.jpg">
</div>

<h2 style="text-align:center;">Spiritual Collection</h2>

<div class="product-grid">

<div class="card" onclick="openModal('Radha Krishna Tee','radha.jpg','450')">
<img src="radha.jpg">
<div class="quick-view">Quick View</div>
<h3>Radha Krishna Tee</h3>
<p>₹450</p>
</div>

<div class="card" onclick="openModal('Shiv Graphic Tee','shiv.jpg','450')">
<img src="shiv.jpg">
<div class="quick-view">Quick View</div>
<h3>Shiv Graphic Tee</h3>
<p>₹450</p>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<img id="modal-img" width="100%">
<h3 id="modal-title"></h3>
<p id="modal-price"></p>

<a id="whatsapp" class="btn whatsapp" target="_blank">WhatsApp</a>
<a id="amazon" class="btn amazon" target="_blank">Amazon</a>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<div id="cart">Cart</div>

<script>

let cart = [];

function openModal(title,img,price){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modal-title").innerText=title;
    document.getElementById("modal-img").src=img;
    document.getElementById("modal-price").innerText="₹"+price;

    document.getElementById("whatsapp").href =
    "https://wa.me/919953690905?text=I want to order "+title;

}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function addToCart(){
    cart.push(1);
    document.getElementById("cart-count").innerText = cart.length;
}

</script>

</body>
</html>
